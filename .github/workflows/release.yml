name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Parse version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $parts = $tag.Split('.')
          $major = $parts[0]; $minor = $parts[1]; $patch = $parts[2]
          $msixVersion = "$major.$minor.$patch.0"
          echo "MSIX_VERSION=$msixVersion" >> $env:GITHUB_OUTPUT
          echo "TAG_VERSION=$tag" >> $env:GITHUB_OUTPUT

      # ── Portable build (single-file exe ZIP) ──
      - name: Publish portable
        run: >
          dotnet publish WavBall/WavBall.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishReadyToRun=true
          -p:PublishReadyToRunComposite=true
          -p:DebugType=embedded
          -o publish

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: WavBall-win-x64
          path: publish/

      # ── MSIX build ──
      - name: Publish for MSIX
        run: >
          dotnet publish WavBall/WavBall.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishReadyToRun=true
          -p:DebugType=embedded
          -o publish-msix

      - name: Prepare MSIX layout
        shell: pwsh
        run: |
          # Stamp version into manifest
          $manifest = Get-Content WavBall/Package.appxmanifest -Raw
          $manifest = $manifest -replace 'Version="0.0.0.0"', "Version=""${{ steps.version.outputs.MSIX_VERSION }}"""
          Set-Content publish-msix/AppxManifest.xml $manifest

          # Copy tile assets
          New-Item -ItemType Directory -Path publish-msix/Assets -Force | Out-Null
          Copy-Item WavBall/Assets/MsixTiles/* publish-msix/Assets/

      - name: Create MSIX package
        shell: pwsh
        run: |
          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\MakeAppx.exe" -ErrorAction SilentlyContinue |
            Sort-Object { $_.Directory.Parent.Name } -Descending | Select-Object -First 1
          if (-not $makeAppx) { throw "MakeAppx.exe not found in Windows SDK" }
          Write-Host "Using: $($makeAppx.FullName)"
          & $makeAppx.FullName pack /d publish-msix /p WavBall.msix /o

      - name: Sign MSIX
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.MSIX_CERT_PFX }}")
          $pfxPath = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\SignTool.exe" -ErrorAction SilentlyContinue |
            Sort-Object { $_.Directory.Parent.Name } -Descending | Select-Object -First 1
          if (-not $signTool) { throw "SignTool.exe not found in Windows SDK" }
          Write-Host "Using: $($signTool.FullName)"
          & $signTool.FullName sign /fd SHA256 /a `
            /f $pfxPath `
            /p "${{ secrets.MSIX_CERT_PASSWORD }}" `
            /tr http://timestamp.digicert.com /td SHA256 `
            WavBall.msix

          Remove-Item $pfxPath -ErrorAction SilentlyContinue

      - name: Build installer exe
        shell: pwsh
        run: >
          dotnet publish WavBall.Installer/WavBall.Installer.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=embedded
          -o installer-build

      - name: Sign installer exe
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String("${{ secrets.MSIX_CERT_PFX }}")
          $pfxPath = "$env:RUNNER_TEMP\cert.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\SignTool.exe" -ErrorAction SilentlyContinue |
            Sort-Object { $_.Directory.Parent.Name } -Descending | Select-Object -First 1
          if (-not $signTool) { throw "SignTool.exe not found" }
          & $signTool.FullName sign /fd SHA256 /a `
            /f $pfxPath `
            /p "${{ secrets.MSIX_CERT_PASSWORD }}" `
            /tr http://timestamp.digicert.com /td SHA256 `
            installer-build/WavBall-Setup.exe

          Remove-Item $pfxPath -ErrorAction SilentlyContinue

      - name: Build installer package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer-output -Force | Out-Null
          Copy-Item installer-build/WavBall-Setup.exe installer-output/
          Copy-Item WavBall.msix installer-output/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WavBall-Installer
          path: installer-output/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
