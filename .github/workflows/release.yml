name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish (single-file)
        run: >
          dotnet publish WavBall/WavBall.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=embedded
          -o publish-singlefile

      - name: Publish (folder)
        run: >
          dotnet publish WavBall/WavBall.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:DebugType=embedded
          -o publish-folder

      - name: Upload single-file artifact
        uses: actions/upload-artifact@v4
        with:
          name: WavBall-win-x64-singlefile
          path: publish-singlefile/

      - name: Upload folder artifact
        uses: actions/upload-artifact@v4
        with:
          name: WavBall-win-x64
          path: publish-folder/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            zip -r "${dir%/}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
